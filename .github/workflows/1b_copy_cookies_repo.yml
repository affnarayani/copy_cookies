name: 1B. Copy Cookies

on: 
  workflow_dispatch: 
  workflow_run:
    workflows: ["1A. Fetch Cookies"]
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  copy-cookies:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv gitpython requests

    - name: Run Copy Cookies Script
      env:
        PAT_TOKEN_ALL: ${{ secrets.PAT_TOKEN_ALL }}
        IMGBBB_API_KEY: ${{ secrets.IMGBBB_API_KEY }}
      run: |
        python copy_cookies_repo.py
