name: 1A. Fetch Cookies

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-cookies:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Pull Latest Changes (Maintain Persistence)
      run: |
        git pull origin ${GITHUB_REF_NAME} --rebase

    - name: Install and Start Cloudflare WARP (TUN Global Mode)
      run: |
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
        
        sudo apt-get update && sudo apt-get install -y cloudflare-warp
        
        sudo systemctl start warp-svc
        sleep 2
        
        warp-cli --accept-tos registration new || warp-cli registration new
        
        warp-cli --accept-tos mode warp || warp-cli mode warp
        
        warp-cli --accept-tos connect || warp-cli connect
        sleep 5
        
        curl https://cloudflare.com/cdn-cgi/trace

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright playwright-stealth cryptography python-dotenv requests
        playwright install chromium --with-deps

    - name: Run Fetch Cookies Script
      env:
        DECRYPT_KEY: ${{ secrets.DECRYPT_KEY }}
        SECRET_CODE: ${{ secrets.SECRET_CODE }}
        IMGBBB_API_KEY: ${{ secrets.IMGBBB_API_KEY }}
      run: |
        curl -I https://cloudflare.com/cdn-cgi/trace || echo "Proxy not responding"
        sudo apt-get update
        sudo apt-get install -y xvfb x11-xserver-utils
        xvfb-run python fetch_cookies.py

    - name: Upload Error Screenshot
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: fetch-cookies-error-screenshot
        path: error_screenshot.png
        if-no-files-found: ignore
        retention-days: 3

    - name: Commit and Push Cookie Changes
      if: always()
      run: |
        # Check agar chatgpt_cookies directory mein koi changes hain
        if ! git diff --quiet chatgpt_cookies/; then
          echo "[OK] Changes detected in chatgpt_cookies/. Stashing modified files to pull latest..."
          git stash
          
          git pull origin ${GITHUB_REF_NAME} --rebase
          
          git stash pop
          
          git add chatgpt_cookies/
          git commit -m "Automated: Fresh ChatGPT cookies updated [skip ci]"
          
          git push origin ${GITHUB_REF_NAME} || (git pull origin ${GITHUB_REF_NAME} --rebase && git push origin ${GITHUB_REF_NAME})
        else
          echo "[INFO] No changes detected in chatgpt_cookies/. Skipping push."
        fi